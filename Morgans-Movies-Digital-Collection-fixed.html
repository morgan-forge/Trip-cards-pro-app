<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="theme-color" content="#0f172a">
	<title>Morgans' Movies</title>
	<style>
		:root {
			--bg: #0f172a;
			--card: #1e293b;
			--accent: #3b82f6;
			--text: #f8fafc;
			--text-dim: #94a3b8;
			--warning: #ef4444;
			--imdb: #f5c518;
			--prime-bg: #1a242e;
			--prime-blue: #00a8e1;
			--apple-bg: #ffffff;
			--apple-text: #000000;
			--sky-bg: #00a0e3;
			--sky-text: #ffffff;
			--defunct: #475569;
		}

		html {
			background-color: var(--bg);
			min-height: 100%;
			-webkit-text-size-adjust: 100%;
		}

		* {
			box-sizing: border-box;
			-webkit-tap-highlight-color: transparent;
		}

		body {
			background-color: var(--bg);
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
			margin: 0;
			padding: 20px;
			padding-top: calc(env(safe-area-inset-top) + 10px);
			min-height: 100vh;
			min-height: -webkit-fill-available;
		}

		header {
			margin-bottom: 20px;
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
		}

		h1 {
			font-weight: 900;
			font-size: 24px;
			margin: 0;
			color: var(--accent);
		}

		.subtitle {
			font-size: 10px;
			text-transform: uppercase;
			letter-spacing: 2px;
			color: var(--text-dim);
		}

		.controls {
			display: flex;
			flex-direction: column;
			gap: 10px;
			margin-bottom: 20px;
		}

		.search-container {
			position: relative;
			width: 100%;
		}

		input {
			width: 100%;
			background: var(--card);
			border: 2px solid transparent;
			border-radius: 14px;
			padding: 16px;
			padding-right: 45px;
			color: white;
			font-size: 18px;
			outline: none;
			transition: 0.2s;
		}

		input:focus {
			border-color: var(--accent);
		}

		.clear-btn {
			position: absolute;
			right: 12px;
			top: 50%;
			transform: translateY(-50%);
			background: rgba(255, 255, 255, 0.1);
			border: none;
			color: white;
			width: 26px;
			height: 26px;
			border-radius: 50%;
			font-weight: bold;
			display: none;
			align-items: center;
			justify-content: center;
			font-size: 14px;
		}

		.sort-row {
			display: flex;
			background: var(--card);
			border-radius: 12px;
			padding: 4px;
		}

		.sort-btn {
			flex: 1;
			border: none;
			background: none;
			color: var(--text-dim);
			padding: 10px;
			font-weight: bold;
			border-radius: 8px;
			font-size: 11px;
			text-transform: uppercase;
		}

		.sort-btn.active {
			background: var(--accent);
			color: white;
		}

		.list {
			display: flex;
			flex-direction: column;
			gap: 10px;
			padding-bottom: 150px;
		}

		.item {
			background: rgba(30, 41, 59, 0.4);
			border: 1px solid rgba(255, 255, 255, 0.05);
			padding: 16px;
			border-radius: 20px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.item.defunct {
			opacity: 0.6;
			border-style: dashed;
		}

		.item-title {
			font-weight: 700;
			font-size: 16px;
			margin-bottom: 2px;
			max-width: 55%;
			line-height: 1.2;
		}

		.item-year {
			font-size: 10px;
			color: var(--accent);
			font-weight: 700;
			text-transform: uppercase;
			margin-bottom: 4px;
		}

		.item-meta {
			font-size: 11px;
			color: var(--text-dim);
		}

		.badge-stack {
			display: flex;
			flex-direction: column;
			gap: 6px;
			align-items: flex-end;
			min-width: 130px;
		}

		.btn-link {
			text-decoration: none;
			font-weight: 800;
			font-size: 9px;
			padding: 6px 8px;
			border-radius: 8px;
			text-align: center;
			width: 100%;
			text-transform: uppercase;
		}

		.btn-imdb {
			background: var(--imdb);
			color: #000;
		}

		.btn-prime {
			background: var(--prime-bg);
			color: var(--prime-blue);
			border: 1px solid var(--prime-blue);
		}

		.btn-apple {
			background: var(--apple-bg);
			color: var(--apple-text);
		}

		.btn-sky {
			background: var(--sky-bg);
			color: var(--sky-text);
		}

		.btn-defunct {
			background: var(--defunct);
			color: #fff;
			cursor: not-allowed;
		}

		.warning-banner {
			position: fixed;
			bottom: 40px;
			left: 20px;
			right: 20px;
			background: var(--warning);
			padding: 20px;
			border-radius: 24px;
			display: none;
			box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
			animation: bounce 0.4s infinite alternate;
			z-index: 100;
		}

		@keyframes bounce {
			from {
				transform: translateY(0);
			}

			to {
				transform: translateY(-8px);
			}
		}
	</style>
</head>

<body>
	<header>
		<div>
			<h1>Morgans' Movies</h1>
			<div class="subtitle">The Digital Collection TEST</div>
		</div>
		<div id="stats" style="text-align:right; font-size: 9px; color: var(--text-dim);"></div>
	</header>

	<div class="controls">
		<div class="search-container">
			<input type="text" id="searchInput" placeholder="Search film title..." autocomplete="off">
			<button id="clearSearch" class="clear-btn" onclick="clearInput()">✕</button>
		</div>
		<div class="sort-row">
			<button class="sort-btn active" id="sortNew" onclick="setSort('newest')">Release Date</button>
			<button class="sort-btn" id="sortAlpha" onclick="setSort('alpha')">A-Z List</button>
		</div>
	</div>

	<div class="list" id="mediaList"></div>

	<div class="warning-banner" id="warningBanner">
		<div style="font-weight:900; font-size:18px;">⚠️ DO NOT REBUY!</div>
		<div id="warningDetail" style="font-size:13px; opacity:0.9;"></div>
	</div>

	<script>
		(function() {
			'use strict';

			const movies = [
				// BLINKBOX (LEGACY)
				{ t: "Point Break", y: 1991, p: "blinkbox", i: "tt0102685", st: "defunct" },
				{ t: "Despicable Me", y: 2010, p: "blinkbox", i: "tt1323594", st: "defunct" },
				{ t: "Black Swan", y: 2010, p: "blinkbox", i: "tt0947798", st: "defunct" },
				// SKY STORE
				{ t: "Bumblebee", y: 2018, p: "sky", i: "tt4701182" },
				{ t: "The Lost City", y: 2022, p: "sky", i: "tt13320622" },
				// APPLE TV (VERIFIED)
				{ t: "Moana 2", y: 2024, p: "apple", i: "tt13622970" },
				{ t: "Wicked", y: 2024, p: "apple", i: "tt1262426" },
				{ t: "A Haunting in Venice", y: 2023, p: "apple", i: "tt22687790" },
				{ t: "Transformers: The Movie", y: 1986, p: "apple", i: "tt0092106" },
				{ t: "Sinners", y: 2025, p: "apple", i: "tt31193180" },
				{ t: "The Phoenician Scheme", y: 2025, p: "apple", i: "tt30840798" },
				{ t: "Ghostbusters: Frozen Empire", y: 2024, p: "apple", i: "tt21235248" },
				{ t: "Indiana Jones and the Dial of Destiny", y: 2023, p: "apple", i: "tt1462764" },
				{ t: "Napoleon", y: 2023, p: "apple", i: "tt13287846" },
				{ t: "Bill & Ted Face the Music", y: 2020, p: "apple", i: "tt1168591" },
				{ t: "Angels & Demons", y: 2009, p: "apple", i: "tt0808151" },
				{ t: "Maleficent", y: 2014, p: "apple", i: "tt1587310" },
				{ t: "Home Alone 2: Lost in New York", y: 1992, p: "apple", i: "tt0104447" },
				{ t: "Hackers", y: 1995, p: "apple", i: "tt0113243" },
				{ t: "Toy Story Toons: Hawaiian Vacation", y: 2011, p: "apple", i: "tt1839561" },
				{ t: "Toy Story Toons: Small Fry", y: 2011, p: "apple", i: "tt2071536" },
				{ t: "The After: Oscar Live Action Short Films", y: 2015, p: "apple", i: "tt30894082" },
				{ t: "Avengers: Age of Ultron", y: 2015, p: "apple", i: "tt2395427" },
				// PRIME VIDEO
				{ t: "Clueless", y: 1995, p: "prime", i: "tt0112697" },
				{ t: "Barbie", y: 2023, p: "prime", i: "tt1517268" },
				{ t: "Spider-Man: Across the Spider-Verse", y: 2023, p: "prime", i: "tt9362722" },
				{ t: "The Hobbit: The Battle of the Five Armies", y: 2014, p: "prime", i: "tt2310332" },
				{ t: "The Hobbit: The Desolation of Smaug", y: 2013, p: "prime", i: "tt1170358" },
				{ t: "Labyrinth", y: 1986, p: "prime", i: "tt0091369" },
				{ t: "The Godfather Part II", y: 1974, p: "prime", i: "tt0071562" },
				{ t: "The Godfather", y: 1972, p: "prime", i: "tt0068646" },
				{ t: "The Goonies", y: 1985, p: "prime", i: "tt0089218" },
				{ t: "Jurassic Park", y: 1993, p: "prime", i: "tt0107290" },
				{ t: "Star Wars: Episode I – The Phantom Menace", y: 1999, p: "prime", i: "tt0120915" },
				{ t: "Star Wars: Episode II – Attack of the Clones", y: 2002, p: "prime", i: "tt0121765" },
				{ t: "The Lego Movie", y: 2014, p: "prime", i: "tt1490017" }
			];

			var currentSort = 'newest';

			function render() {
				try {
					var searchEl = document.getElementById('searchInput');
					var list = document.getElementById('mediaList');
					var banner = document.getElementById('warningBanner');
					var clearBtn = document.getElementById('clearSearch');
					var statsEl = document.getElementById('stats');

					if (!list) return;

					var query = (searchEl && searchEl.value) ? searchEl.value.toLowerCase() : '';

					list.innerHTML = '';
					if (statsEl) statsEl.textContent = movies.length + ' FILMS ARCHIVED';
					if (clearBtn) clearBtn.style.display = query.length > 0 ? 'flex' : 'none';

					var items = movies.slice(0).filter(function(i) { return i.t.toLowerCase().indexOf(query) !== -1; });
					if (currentSort === 'alpha') {
						items.sort(function(a, b) { return a.t.localeCompare(b.t); });
					} else {
						items.sort(function(a, b) { return b.y - a.y; });
					}

					var schemes = { apple: "videos://", prime: "primevideo://", sky: "skystore://" };
					var labels = { apple: "Apple TV", prime: "Prime Video", sky: "Sky Store" };

					for (var idx = 0; idx < items.length; idx++) {
						var item = items[idx];
						var div = document.createElement('div');
						div.className = (item.st === 'defunct') ? 'item defunct' : 'item';

						var imdbBtn = '<a href="https://www.imdb.com/title/' + item.i + '/" class="btn-link btn-imdb">IMDb</a>';
						var storeBtn;
						if (item.st === 'defunct') {
							storeBtn = '<span class="btn-link btn-defunct">Service Defunct</span>';
						} else {
							var scheme = schemes[item.p] || '#';
							var label = labels[item.p] || item.p;
							storeBtn = '<a href="' + scheme + '" class="btn-link btn-' + item.p + '">' + label + '</a>';
						}

						var inner = '<div><div class="item-year">' + item.y + '</div><div class="item-title">' + item.t + '</div><div class="item-meta">STORE: ' + (item.p || '').toUpperCase() + '</div></div><div class="badge-stack">' + imdbBtn + storeBtn + '</div>';
						div.innerHTML = inner;
						list.appendChild(div);
					}

					var match = null;
					for (var m = 0; m < movies.length; m++) {
						if (movies[m].t.toLowerCase() === query) { match = movies[m]; break; }
					}
					if (banner) {
						if (match && query.length > 2) {
							var providerMap = { apple: "Apple TV", prime: "Prime Video", sky: "Sky Store", blinkbox: "Blinkbox (Defunct)" };
							var detail = document.getElementById('warningDetail');
							if (detail) detail.textContent = 'Owned on ' + (providerMap[match.p] || match.p);
							banner.style.display = 'block';
						} else {
							banner.style.display = 'none';
						}
					}
				} catch (e) {
					var list = document.getElementById('mediaList');
					if (list) list.innerHTML = '<p style="color:var(--text-dim);padding:20px;">Could not load list. Try refreshing.</p>';
				}
			}

			function clearInput() {
				var el = document.getElementById('searchInput');
				if (el) { el.value = ''; render(); }
			}

			function setSort(s) {
				currentSort = s;
				var sortNew = document.getElementById('sortNew');
				var sortAlpha = document.getElementById('sortAlpha');
				if (sortNew) sortNew.className = (s === 'newest') ? 'sort-btn active' : 'sort-btn';
				if (sortAlpha) sortAlpha.className = (s === 'alpha') ? 'sort-btn active' : 'sort-btn';
				render();
			}

			function init() {
				var searchInput = document.getElementById('searchInput');
				if (searchInput) searchInput.addEventListener('input', render);
				render();
			}

			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', init);
			} else {
				init();
			}
		})();
	</script>
</body>

</html>
