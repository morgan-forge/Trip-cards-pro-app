<!-- TCP HTML renderer — self-contained, zero conflict with app.js -->
<script>
  const TCP_KEY = 'tcp_html_trips';

  function tcpTriggerPicker() {
    document.getElementById('tcp-file-input').click();
  }

  // Drag and drop
  window.addEventListener('DOMContentLoaded', function() {
    var zone = document.getElementById('tcp-drop-zone');
    if (!zone) return;
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('over'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault();
      zone.classList.remove('over');
      var f = e.dataTransfer.files[0];
      if (f) tcpHandleFile(f);
    });

    // Init saved list when TCP nav button clicked
    var navBtn = document.getElementById('nav-tcp-btn');
    if (navBtn) navBtn.addEventListener('click', tcpRenderSaved);
  });

  function tcpHandleFile(file) {
    if (!file || !file.name.endsWith('.html')) {
      alert('Please choose a Trip Cards Pro HTML file.');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      var trip = tcpParse(e.target.result);
      if (!trip) { alert("This doesn't look like a Trip Cards Pro file."); return; }
      tcpSave(trip);
      tcpRender(trip);
      // Switch to TCP view via nav button
      var btn = document.getElementById('nav-tcp-btn');
      if (btn) btn.click();
    };
    reader.readAsText(file);
  }

  function tcpParse(html) {
    var doc = new DOMParser().parseFromString(html, 'text/html');
    var header = doc.querySelector('.trip-header');
    var cards  = doc.querySelectorAll('.day-card');
    if (!header || cards.length === 0) return null;
    // Strip internal artefacts
    doc.querySelectorAll('.pdf-btn, .pdf-status, script').forEach(function(el) { el.remove(); });
    doc.querySelectorAll('.chip.warn').forEach(function(el) { el.remove(); });
    var titleEl = doc.querySelector('.trip-title');
    var name = titleEl ? titleEl.innerText.replace(/\n/g,' ').trim() : (doc.title || 'Trip');
    return {
      id:         'tcp_' + Date.now(),
      name:       name,
      savedAt:    new Date().toISOString(),
      headerHTML: header.outerHTML,
      cardsHTML:  Array.from(cards).map(function(c){ return c.outerHTML; }).join('\n')
    };
  }

  function tcpGetTrips() {
    try { return JSON.parse(localStorage.getItem(TCP_KEY) || '[]'); } catch(e) { return []; }
  }

  function tcpSave(trip) {
    var trips = tcpGetTrips().filter(function(t){ return t.name !== trip.name; });
    trips.unshift(trip);
    localStorage.setItem(TCP_KEY, JSON.stringify(trips.slice(0,10)));
  }

  function tcpClearAll() {
    if (confirm('Remove all saved Trip Cards from this device?')) {
      localStorage.removeItem(TCP_KEY);
      tcpRenderSaved();
      document.getElementById('tcp-host').innerHTML = '';
      document.getElementById('tcp-upload-prompt').style.display = '';
    }
  }

  function tcpRenderSaved() {
    var trips   = tcpGetTrips();
    var section = document.getElementById('tcp-saved-section');
    var list    = document.getElementById('tcp-saved-list');
    if (!section || !list) return;
    if (trips.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = trips.map(function(t) {
      return '<div class="tcp-saved-item" onclick="tcpLoadById(\'' + t.id + '\')">'
        + '<div><div class="tcp-saved-name">' + tcpEsc(t.name) + '</div>'
        + '<div class="tcp-saved-meta">Saved ' + tcpFmt(t.savedAt) + '</div></div>'
        + '<div class="tcp-saved-arrow">›</div></div>';
    }).join('');
  }

  function tcpLoadById(id) {
    var trip = tcpGetTrips().find(function(t){ return t.id === id; });
    if (trip) tcpRender(trip);
  }

  function tcpRender(trip) {
    var host   = document.getElementById('tcp-host');
    var prompt = document.getElementById('tcp-upload-prompt');
    if (!host) return;
    host.innerHTML = trip.headerHTML + '\n' + trip.cardsHTML;
    if (prompt) prompt.style.display = 'none';
    tcpRenderSaved();
    window.scrollTo(0,0);
  }

  function tcpEsc(s) {
    return s.replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; });
  }
  function tcpFmt(iso) {
    try { return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(e){ return ''; }
  }
</script>
